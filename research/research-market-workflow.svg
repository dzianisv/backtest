<svg viewBox="0 0 820 980" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" font-size="12">
  <title>research-market dynamic workflow</title>
  <desc>6-phase pipeline: Intake → Gather (parallel feeds) → Consolidate → Panel (analyst lenses) → Decide → Ledger</desc>

  <rect width="820" height="980" fill="#0f0f0f"/>

  <!-- Phase bands -->
  <rect x="28" y="40"  width="778" height="90"  rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="28" y="145" width="778" height="380" rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="28" y="540" width="778" height="80"  rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="28" y="635" width="778" height="110" rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="28" y="760" width="778" height="110" rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="28" y="885" width="778" height="75"  rx="6" fill="#1a1a1a" opacity="0.8"/>

  <!-- Phase labels -->
  <text x="14" y="95"  fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,95)"  text-anchor="middle">INTAKE</text>
  <text x="14" y="310" fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,310)" text-anchor="middle">GATHER</text>
  <text x="14" y="560" fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,560)" text-anchor="middle">CONSOLIDATE</text>
  <text x="14" y="680" fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,680)" text-anchor="middle">PANEL</text>
  <text x="14" y="830" fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,830)" text-anchor="middle">DECIDE</text>
  <text x="14" y="945" fill="#555" font-size="9" font-weight="600" letter-spacing="1" transform="rotate(-90,14,945)" text-anchor="middle">LEDGER</text>

  <!-- INTAKE -->
  <rect x="290" y="55" width="240" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="79" fill="#93c5fd" font-size="11" font-weight="700" text-anchor="middle">INTAKE MANAGER</text>
  <text x="410" y="95" fill="#60a5fa" font-size="10" text-anchor="middle">reads question · selects skills · builds roster</text>
  <text x="410" y="109" fill="#475569" font-size="9" text-anchor="middle">dynamic — roster changes per query</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <line x1="410" y1="115" x2="410" y2="145" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GATHER row 1 -->
  <rect x="42"  y="155" width="145" height="52" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="114" y="174" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">ON-CHAIN DATA</text>
  <text x="114" y="188" fill="#4ade80" font-size="9" text-anchor="middle">MVRV-Z · NUPL · realized</text>
  <text x="114" y="200" fill="#4ade80" font-size="9" text-anchor="middle">price · Puell · hashrate</text>

  <rect x="200" y="155" width="145" height="52" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="272" y="174" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">DERIVATIVES</text>
  <text x="272" y="188" fill="#4ade80" font-size="9" text-anchor="middle">funding · OI · skew</text>
  <text x="272" y="200" fill="#4ade80" font-size="9" text-anchor="middle">liquidations · basis</text>

  <rect x="358" y="155" width="145" height="52" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="174" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">MACRO</text>
  <text x="430" y="188" fill="#4ade80" font-size="9" text-anchor="middle">FOMC · CPI · DXY</text>
  <text x="430" y="200" fill="#4ade80" font-size="9" text-anchor="middle">M2 · Fed balance sheet</text>

  <rect x="516" y="155" width="145" height="52" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="588" y="174" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">LIQUIDITY FLOWS</text>
  <text x="588" y="188" fill="#4ade80" font-size="9" text-anchor="middle">Howell global liq · RRP</text>
  <text x="588" y="200" fill="#4ade80" font-size="9" text-anchor="middle">TGA · spot ETF flows</text>

  <rect x="674" y="155" width="120" height="52" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="734" y="174" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">PRED. MARKETS</text>
  <text x="734" y="188" fill="#4ade80" font-size="9" text-anchor="middle">Polymarket · Kalshi</text>
  <text x="734" y="200" fill="#4ade80" font-size="9" text-anchor="middle">ZQ FedWatch</text>

  <!-- GATHER row 2 -->
  <rect x="42"  y="225" width="130" height="50" rx="6" fill="#1c1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="107" y="244" fill="#c4b5fd" font-size="10" font-weight="600" text-anchor="middle">FILINGS</text>
  <text x="107" y="258" fill="#a78bfa" font-size="9" text-anchor="middle">13F · 13D · activist</text>
  <text x="107" y="270" fill="#a78bfa" font-size="9" text-anchor="middle">Congress trades</text>

  <rect x="184" y="225" width="110" height="50" rx="6" fill="#1c1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="239" y="244" fill="#c4b5fd" font-size="10" font-weight="600" text-anchor="middle">PRESS</text>
  <text x="239" y="258" fill="#a78bfa" font-size="9" text-anchor="middle">WSJ · FT</text>
  <text x="239" y="270" fill="#a78bfa" font-size="9" text-anchor="middle">Bloomberg</text>

  <rect x="306" y="225" width="155" height="50" rx="6" fill="#1c1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="383" y="244" fill="#c4b5fd" font-size="10" font-weight="600" text-anchor="middle">CRYPTO NEWS</text>
  <text x="383" y="258" fill="#a78bfa" font-size="9" text-anchor="middle">CoinTelegraph · CoinDesk</text>
  <text x="383" y="270" fill="#a78bfa" font-size="9" text-anchor="middle">Decrypt · Block · Coinbase</text>

  <rect x="473" y="225" width="120" height="50" rx="6" fill="#1c1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="533" y="244" fill="#c4b5fd" font-size="10" font-weight="600" text-anchor="middle">REGIME</text>
  <text x="533" y="258" fill="#a78bfa" font-size="9" text-anchor="middle">SPY 200dMA · VIX</text>
  <text x="533" y="270" fill="#a78bfa" font-size="9" text-anchor="middle">credit · breadth</text>

  <rect x="605" y="225" width="120" height="50" rx="6" fill="#1c1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="665" y="244" fill="#c4b5fd" font-size="10" font-weight="600" text-anchor="middle">DIP SCANNER</text>
  <text x="665" y="258" fill="#a78bfa" font-size="9" text-anchor="middle">52w high dist · F&amp;G</text>
  <text x="665" y="270" fill="#a78bfa" font-size="9" text-anchor="middle">conviction tiers</text>

  <text x="410" y="292" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">all gather seats run in parallel</text>

  <!-- converge arrows -->
  <line x1="114" y1="275" x2="114" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="239" y1="275" x2="239" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="383" y1="275" x2="383" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="533" y1="275" x2="533" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="665" y1="275" x2="665" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="114" y1="310" x2="665" y2="310" stroke="#475569" stroke-width="1"/>
  <line x1="410" y1="310" x2="410" y2="340" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="200" y="315" width="420" height="20" rx="4" fill="#1a1208" stroke="#78350f" stroke-width="0.5"/>
  <text x="410" y="329" fill="#fbbf24" font-size="9" text-anchor="middle">§10 CANONICAL-NUMBER RULE: conflicting metrics resolved to one value before downstream</text>

  <!-- CONSOLIDATE -->
  <rect x="200" y="347" width="420" height="58" rx="8" fill="#1e2a3a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="410" y="368" fill="#7dd3fc" font-size="11" font-weight="700" text-anchor="middle">CRYPTO RESEARCH DESK</text>
  <text x="410" y="383" fill="#38bdf8" font-size="9" text-anchor="middle">merges all seats → 11-section brief</text>
  <text x="410" y="396" fill="#38bdf8" font-size="9" text-anchor="middle">price · onchain · derivatives · macro · liquidity · sentiment · news · pred-market · conflicts · gaps</text>

  <line x1="410" y1="405" x2="410" y2="458" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- brief fan-out -->
  <line x1="92"  y1="458" x2="760" y2="458" stroke="#38bdf8" stroke-width="1"/>
  <text x="410" y="476" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">brief broadcast to all panel seats in parallel</text>

  <line x1="92"  y1="458" x2="92"  y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="204" y1="458" x2="204" y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="316" y1="458" x2="316" y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="428" y1="458" x2="428" y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="540" y1="458" x2="540" y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="652" y1="458" x2="652" y2="645" stroke="#f97316" stroke-width="0.8"/>
  <line x1="760" y1="458" x2="760" y2="645" stroke="#6366f1" stroke-width="0.8"/>

  <!-- PANEL boxes -->
  <rect x="42"  y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="92"  y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">BUFFETT/GRAHAM</text>
  <text x="92"  y="674" fill="#fb923c" font-size="8" text-anchor="middle">value / MOS</text>
  <text x="92"  y="685" fill="#fb923c" font-size="8" text-anchor="middle">moat lens</text>

  <rect x="154" y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="204" y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">DALIO/DRUCKM.</text>
  <text x="204" y="674" fill="#fb923c" font-size="8" text-anchor="middle">macro cycles</text>
  <text x="204" y="685" fill="#fb923c" font-size="8" text-anchor="middle">debt supercycle</text>

  <rect x="266" y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="316" y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">LYN ALDEN</text>
  <text x="316" y="674" fill="#fb923c" font-size="8" text-anchor="middle">liquidity &amp; fiscal</text>
  <text x="316" y="685" fill="#fb923c" font-size="8" text-anchor="middle">BTC network value</text>

  <rect x="378" y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="428" y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">DERIVATIVES</text>
  <text x="428" y="674" fill="#fb923c" font-size="8" text-anchor="middle">positioning</text>
  <text x="428" y="685" fill="#fb923c" font-size="8" text-anchor="middle">options/gamma</text>

  <rect x="490" y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="540" y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">TECHNICAL</text>
  <text x="540" y="674" fill="#fb923c" font-size="8" text-anchor="middle">trend/momentum</text>
  <text x="540" y="685" fill="#fb923c" font-size="8" text-anchor="middle">200w MA signal</text>

  <rect x="602" y="645" width="100" height="42" rx="5" fill="#2a1a1a" stroke="#f97316" stroke-width="1"/>
  <text x="652" y="661" fill="#fdba74" font-size="9" font-weight="600" text-anchor="middle">SUPERFORECASTER</text>
  <text x="652" y="674" fill="#fb923c" font-size="8" text-anchor="middle">crowd calibration</text>
  <text x="652" y="685" fill="#fb923c" font-size="8" text-anchor="middle">base-rate odds</text>

  <rect x="714" y="645" width="92" height="42" rx="5" fill="#1a1a2a" stroke="#6366f1" stroke-width="1"/>
  <text x="760" y="661" fill="#a5b4fc" font-size="9" font-weight="600" text-anchor="middle">HOUSEL</text>
  <text x="760" y="674" fill="#818cf8" font-size="8" text-anchor="middle">behaviour guard</text>
  <text x="760" y="685" fill="#818cf8" font-size="8" text-anchor="middle">(non-voting)</text>

  <!-- panel converge -->
  <line x1="92"  y1="687" x2="92"  y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="204" y1="687" x2="204" y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="316" y1="687" x2="316" y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="428" y1="687" x2="428" y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="540" y1="687" x2="540" y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="652" y1="687" x2="652" y2="730" stroke="#f97316" stroke-width="0.8"/>
  <line x1="760" y1="687" x2="760" y2="730" stroke="#6366f1" stroke-width="0.8"/>
  <line x1="92"  y1="730" x2="760" y2="730" stroke="#f97316" stroke-width="1"/>
  <line x1="410" y1="730" x2="410" y2="760" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DECIDE -->
  <rect x="200" y="768" width="420" height="68" rx="8" fill="#1e1e2a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="410" y="789" fill="#c4b5fd" font-size="11" font-weight="700" text-anchor="middle">CRYPTO CHAIR</text>
  <text x="410" y="804" fill="#a78bfa" font-size="9" text-anchor="middle">quorum tally · portfolio-aware buy/trim/hold</text>
  <text x="410" y="817" fill="#a78bfa" font-size="9" text-anchor="middle">tranche plan · invalidation · per-asset conviction (BTC/ETH/SOL differentiated)</text>
  <text x="410" y="830" fill="#a78bfa" font-size="9" text-anchor="middle">compact report ~10KB written to disk (brief excluded — too large for LLM write agent)</text>

  <line x1="410" y1="836" x2="410" y2="885" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEDGER -->
  <rect x="200" y="893" width="420" height="55" rx="8" fill="#1a1a1a" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="913" fill="#94a3b8" font-size="11" font-weight="700" text-anchor="middle">FORECAST LEDGER</text>
  <text x="410" y="928" fill="#64748b" font-size="9" text-anchor="middle">per-asset prob · horizon · lenses → forecasts/ledger.jsonl</text>
  <text x="410" y="941" fill="#64748b" font-size="9" text-anchor="middle">filters pseudo-assets · one-line cap on question field</text>
</svg>
